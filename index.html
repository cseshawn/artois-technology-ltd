<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artois Technology Limited</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <!-- Logo -->
        <div class="logo-mark">
          <span>A</span>
        </div>

        <!-- Brand name -->
        <h1 class="brand-name">ARTOIS</h1>
        <p class="brand-sub">TECHNOLOGY LIMITED</p>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Highlighted maintenance banner -->
        <div class="maintenance-banner">
          <span class="maintenance-icon">🔧</span>
          <p class="maintenance-text">Website under maintenance</p>
          <p class="maintenance-sub">we'll be back soon</p>
        </div>

        <!-- Beautiful email contact -->
        <div class="contact-wrapper">
          <div class="contact-card">
            <div class="contact-icon-wrapper">
              <svg
                class="contact-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline points="22,6 12,13 2,6" />
              </svg>
            </div>
            <div class="contact-text">
              <span class="contact-label">Reach out to us</span>
              <a
                href="mailto:info@artoistechnologyltd.com"
                class="contact-email"
              >
                info@artoistechnologyltd.com
              </a>
            </div>
            <div class="contact-arrow">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="footer">
          <p>&copy; 2026 Artois Technology Limited</p>
        </div>
      </div>
    </div>
  </body>
</html>
